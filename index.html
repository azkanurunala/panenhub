*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0c0a09;font-family:'Plus Jakarta Sans',sans-serif}
#app{min-height:100vh;display:flex;justify-content:center;background:#0c0a09}
.shell{width:100%;max-width:430px;min-height:100vh;background:#fafaf9;position:relative;box-shadow:0 0 80px rgba(0,0,0,.6)}
.gh{background:linear-gradient(145deg,#14532d 0%,#166534 55%,#15803d 100%)}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
.shadow-card{box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.05)}
.tap{transition:transform .12s;cursor:pointer;user-select:none}
.tap:active{transform:scale(.97)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease forwards;opacity:0}
.d1{animation-delay:.04s}.d2{animation-delay:.09s}.d3{animation-delay:.14s}.d4{animation-delay:.19s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pls{animation:pulse 1.8s ease-in-out infinite}
.progress{transition:width .5s ease}
input,button,select{font-family:inherit;border:none;background:none;cursor:pointer}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.notif-overlay{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.5)}
.notif-box{position:absolute;top:96px;left:12px;right:12px;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden}

const fmt   = n => new Intl.NumberFormat('id-ID').format(n);
const fmtRp = n => 'Rp ' + fmt(n);
const fmtK  = n => n >= 1e9 ? (n/1e9).toFixed(1)+'M' : n >= 1e6 ? (n/1e6).toFixed(1)+'jt' : n >= 1e3 ? (n/1e3).toFixed(0)+'rb' : String(n);
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function sparklineSVG(hist,up,w=72,h=32){
  const mn=Math.min(...hist),mx=Math.max(...hist),r=mx-mn||1;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*w},${h-((v-mn)/r)*(h-6)-3}`).join(' ');
  const col=up===true?'#dc2626':up===false?'#16a34a':'#d97706';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function bigChartSVG(hist,trend,W=260,H=52){
  const mn=Math.min(...hist),mx=Math.max(...hist),r=mx-mn||1;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*W},${H-((v-mn)/r)*(H-8)-4}`).join(' ');
  const col=trend==='up'?'#dc2626':trend==='down'?'#16a34a':'#d97706';
  const bg=trend==='up'?'#fef2f2':trend==='down'?'#f0fdf4':'#fef3c7';
  const dots=hist.map((v,i)=>{const x=(i/(hist.length-1))*W,y=H-((v-mn)/r)*(H-8)-4;return `<circle cx="${x}" cy="${y}" r="4" fill="${col}"/><circle cx="${x}" cy="${y}" r="2" fill="white"/>`;}).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H+4}" style="overflow:visible"><polygon points="0,${H+4} ${pts} ${W},${H+4}" fill="${bg}"/><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}
function trendLabel(c){
  const sign=c.trend==='up'?'↑ +':c.trend==='down'?'↓ −':'→ ';
  const col=c.trend==='up'?'text-red-500':c.trend==='down'?'text-green-600':'text-stone-400';
  return `<span class="${col} text-xs font-bold">${sign}${c.ch}%</span>`;
}
function statusBadge(s){
  const map={surplus:['Surplus','bg-green-100 text-green-700'],defisit:['Defisit','bg-red-100 text-red-700'],seimbang:['Seimbang','bg-amber-100 text-amber-700'],menunggu:['Menunggu','bg-amber-100 text-amber-700'],diproses:['Diproses','bg-blue-100 text-blue-700'],selesai:['Selesai','bg-green-100 text-green-700'],dalam_perjalanan:['Dalam Perjalanan','bg-blue-100 text-blue-700'],menunggu_pickup:['Menunggu Pickup','bg-amber-100 text-amber-700']};
  const[l,c]=map[s]||['—','bg-stone-100 text-stone-500'];
  return `<span class="${c} text-[10px] font-semibold px-2 py-0.5 rounded-full">${l}</span>`;
}
function badge(label,col='green'){

  ];
  const unread=NOTIFS.filter(n=>!n.read).length;
  return `<nav class="bottom-nav">${tabs.map(t=>{

    return `<button class="${col} flex flex-col items-center justify-center flex-1 py-2.5 gap-0.5" data-nav="${t.id}">

          <div>
            <div class="font-extrabold text-stone-800 text-sm">${escHtml(m.kom)}</div>
            <div class="text-[11px] text-stone-400 mt-0.5">${m.tgl}</div>
          </div>
          ${statusBadge(m.status)}
        </div>
        <div class="flex items-center gap-2 mb-3">
          <div class="bg-green-50 border border-green-200 rounded-xl px-2.5 py-1.5 text-xs font-bold text-green-700">${escHtml(m.dari)}</div>
          <div class="flex-1 flex items-center">${SVG_ARR}</div>
          <div class="bg-red-50 border border-red-200 rounded-xl px-2.5 py-1.5 text-xs font-bold text-red-700">${escHtml(m.ke)}</div>
        </div>
        <div class="grid grid-cols-3 gap-2">
          ${[['Volume',m.vol+' '+m.sat],['Nilai',fmtK(m.nilai)],['Estimasi',m.eta]].map(([k,v])=>`
          <div class="bg-stone-50 rounded-xl p-2 text-center">
            <div class="text-xs font-bold text-stone-700">${v}</div>
            <div class="text-[10px] text-stone-400">${k}</div>
          </div>`).join('')}
        </div>
      </div>`).join('')}
      `}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   SCREEN: AKUN
══════════════════════════════════════ */
function renderAkun(){
  const u=state.user;
  const colMap={petani:'green',pembeli:'blue',koperasi:'amber',pemerintah:'purple'};
  const col=colMap[u.role]||'green';
  const tab=state.akunTab;
  return `
  <div>
    <div class="gh px-4 pt-12 pb-5">
      <div class="flex items-center gap-4 mb-3">
        ${avatar(u.init,'lg',col)}
        <div>
          <div class="text-white font-extrabold text-lg leading-tight">${escHtml(u.name)}</div>
          <div class="text-green-300 text-xs mt-0.5">${ROLE_LABEL[u.role]}</div>
          <div class="text-green-200 text-xs">📍 ${escHtml(u.loc)}</div>
        </div>
      </div>
      <div class="flex gap-2 flex-wrap">
        <span class="bg-white/20 text-white text-xs px-3 py-1 rounded-full font-semibold">Bergabung ${u.join}</span>
        ${u.rating?`<span class="bg-amber-400/30 text-amber-100 text-xs px-3 py-1 rounded-full font-semibold">⭐ ${u.rating} rating</span>`:''}
        ${u.anggota?`<span class="bg-white/20 text-white text-xs px-3 py-1 rounded-full font-semibold">${u.anggota} anggota</span>`:''}
      </div>
    </div>
    <div class="flex bg-white border-b border-stone-100">
      <button class="flex-1 py-3 text-xs font-bold ${tab==='finance'?'text-green-700 border-b-2 border-green-700':'text-stone-400'}" data-akun-tab="finance">TaniFinance 💰</button>
      <button class="flex-1 py-3 text-xs font-bold ${tab==='logistik'?'text-green-700 border-b-2 border-green-700':'text-stone-400'}" data-akun-tab="logistik">LogiSmart 🚚</button>
    </div>
    <div class="px-4 pt-4">
      ${tab==='finance'?`
      <div class="text-xs text-stone-400 mb-3">Produk pembiayaan tersedia untuk Anda</div>
      ${FINANCING.map(f=>`
      <div class="bg-white rounded-2xl p-4 shadow-card mb-3">
        <div class="flex items-start gap-3 mb-3">
          <span class="text-4xl leading-none">${f.icon}</span>
          <div class="flex-1">
            <div class="font-extrabold text-stone-800 text-sm">${escHtml(f.nama)}</div>
            <div class="text-xs text-stone-400 mt-0.5">${escHtml(f.prov)}</div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="text-green-700 font-extrabold text-2xl">${f.bunga}%</div>
            <div class="text-[10px] text-stone-400">/tahun</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <div class="bg-stone-50 rounded-xl p-2.5"><div class="text-[10px] text-stone-400">Maks. pinjaman</div><div class="font-extrabold text-stone-700 text-sm">${fmtK(f.maks)}</div></div>
          <div class="bg-stone-50 rounded-xl p-2.5"><div class="text-[10px] text-stone-400">Tenor</div><div class="font-extrabold text-stone-700 text-sm">${f.tenor} bulan</div></div>
        </div>
        <div class="text-xs text-stone-500 mb-1"><span class="font-bold text-stone-600">Syarat: </span>${escHtml(f.syarat)}</div>
        <div class="text-xs text-stone-500 mb-3"><span class="font-bold text-stone-600">Pencairan: </span>${f.cair}</div>
        <div class="flex gap-1 mb-3 flex-wrap">${f.tags.map(t=>badge(t,'green')).join('')}</div>
        <button class="w-full border-2 border-green-700 text-green-700 font-extrabold py-2.5 rounded-xl text-sm">Ajukan Sekarang</button>
      </div>`).join('')}
      `:/* LOGISTIK */`
      <div class="text-xs text-stone-400 mb-3">${LOGISTIK.length} pengiriman aktif & selesai</div>
      ${LOGISTIK.map(l=>`
      <div class="bg-white rounded-2xl p-4 shadow-card mb-3">
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="font-extrabold text-stone-800 text-sm">${escHtml(l.kom)}</div>
            <div class="text-[11px] text-stone-400 mt-0.5">${l.no}</div>
          </div>
          ${statusBadge(l.status)}
        </div>
        <div class="flex items-center gap-1 mb-3 text-xs text-stone-600">
          <span class="font-bold">${escHtml(l.dari)}</span>
          ${SVG_ARR}
          <span class="font-bold">${escHtml(l.ke)}</span>
        </div>
        <div class="mb-3">
          <div class="flex justify-between text-[10px] text-stone-400 mb-1">
            <span>Progress pengiriman</span><span>${l.prog}%</span>
          </div>
          ${progressBar(l.prog,l.status)}
        </div>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <div class="bg-stone-50 rounded-xl p-2"><div class="text-[10px] text-stone-400">Driver</div><div class="font-bold text-stone-700">${escHtml(l.driver)}</div></div>
          <div class="bg-stone-50 rounded-xl p-2"><div class="text-[10px] text-stone-400">Plat / Biaya</div><div class="font-bold text-stone-700">${l.plat!=='—'?l.plat:fmtRp(l.harga)}</div></div>
        </div>
        <div class="text-[11px] text-stone-400 mt-2">📅 ${l.eta}</div>
      </div>`).join('')}
      `}
      <div class="mt-5 border-t border-stone-100 pt-5 mb-6">
        <button id="logout-btn" class="w-full bg-red-50 border border-red-100 text-red-600 font-bold py-3 rounded-2xl text-sm">🔄 Ganti Akun / Keluar</button>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  const shell=document.getElementById('shell');
  if(!state.user){
    shell.innerHTML=renderLogin();
    bindLogin();
    return;
  }
  const screens={beranda:renderBeranda,pasar:renderPasar,harga:renderHarga,match:renderMatch,akun:renderAkun};
  const content=(screens[state.tab]||renderBeranda)();
  shell.innerHTML=`
    <div class="tab-content">${content}</div>
    ${renderBottomNav()}
  `;
  bindApp();
}

/* ══════════════════════════════════════
   EVENT BINDING
══════════════════════════════════════ */
function bindLogin(){
  document.querySelectorAll('[data-login]').forEach(el=>{
    el.addEventListener('click',()=>{
      const role=el.dataset.login;
      const u=USERS.find(x=>x.role===role);
      setState({user:u,tab:'beranda',notifOpen:false});
    });
  });
}

function bindApp(){
  // Bottom nav
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>setState({tab:el.dataset.nav,pasarSel:null,notifOpen:false}));
  });

  // Notif toggle
  const nb=document.getElementById('notif-btn');
  if(nb) nb.addEventListener('click',()=>setState({notifOpen:!state.notifOpen}));
  const no=document.getElementById('notif-overlay');
  if(no) no.addEventListener('click',()=>setState({notifOpen:false}));

  // Logout
  const lb=document.getElementById('logout-btn');
  if(lb) lb.addEventListener('click',()=>setState({user:null,tab:'beranda',notifOpen:false,pasarSel:null,pasarQ:'',pasarCat:'Semua',hargaSel:0,matchTab:'peta',akunTab:'finance'}));

  // Pasar
  const pq=document.getElementById('pasar-q');
  if(pq) pq.addEventListener('input',e=>setState({pasarQ:e.target.value}));
  const pc=document.getElementById('pasar-clear');
  if(pc) pc.addEventListener('click',()=>setState({pasarQ:''}));
  const pb=document.getElementById('pasar-back');
  if(pb) pb.addEventListener('click',()=>setState({pasarSel:null}));
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click',()=>setState({pasarCat:el.dataset.cat}));
  });
  document.querySelectorAll('[data-open-prod]').forEach(el=>{
    el.addEventListener('click',()=>setState({tab:'pasar',pasarSel:parseInt(el.dataset.openProd)}));
  });

  // Harga
  document.querySelectorAll('[data-harga-sel]').forEach(el=>{
    el.addEventListener('click',()=>setState({hargaSel:parseInt(el.dataset.hargaSel)}));
  });

  // Match tabs
  document.querySelectorAll('[data-match-tab]').forEach(el=>{
    el.addEventListener('click',()=>setState({matchTab:el.dataset.matchTab}));
  });

  // Akun tabs
  document.querySelectorAll('[data-akun-tab]').forEach(el=>{
    el.addEventListener('click',()=>setState({akunTab:el.dataset.akunTab}));
  });
}

// Boot
render();
</script>
</body>
</html>
