*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f8fafc;font-family:'Plus Jakarta Sans',sans-serif;color:#1e293b}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
input,button,select,textarea{font-family:inherit;border:none;cursor:pointer;background:none;outline:none}
.tap{transition:all .12s;cursor:pointer}
.tap:hover{opacity:.88}
.tap:active{transform:scale(.98)}

#layout{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;flex-shrink:0;background:white;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #e2e8f0}
#content{flex:1;overflow-y:auto;background:#f8fafc;min-width:0}
#ai-panel{width:320px;flex-shrink:0;background:#fff;border-left:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}

.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .12s;margin-bottom:2px;color:#64748b;font-size:13px;font-weight:500}
.sb-nav-item:hover{background:#f8fafc;color:#1e293b}
.sb-nav-item.active{background:#f0fdf4;color:#15803d;font-weight:700}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.kpi-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.panel.flush{padding:0;overflow:hidden}
.page{padding:24px 28px 32px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:700;color:#1e293b}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 14px;background:#f8fafc;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.data-table td{padding:11px 14px;border-bottom:1px solid #f0ede8;color:#334155;vertical-align:middle}
.data-table tr:hover td{background:#f8fafc}
.data-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.bg-green{background:#dcfce7;color:#15803d}
.bg-red{background:#fee2e2;color:#dc2626}
.bg-amber{background:#fef9c3;color:#a16207}
.bg-blue{background:#dbeafe;color:#1d4ed8}
.bg-purple{background:#ede9fe;color:#6d28d9}
.bg-gray{background:#f3f4f6;color:#6b7280}
.ai-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:12px}
.ai-pill.predict{background:rgba(59,130,246,.1);color:#2563eb;border:1px solid rgba(59,130,246,.2)}
.ai-pill.prescribe{background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.2)}
.ai-pill.warn{background:rgba(239,68,68,.1);color:#dc2626;border:1px solid rgba(239,68,68,.2)}
.conf-track{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:4px}
.conf-fill{height:100%;border-radius:3px}
.hm-surplus{background:#bbf7d0;color:#14532d}
.hm-seimbang{background:#fef9c3;color:#713f12}
.hm-defisit{background:#fecaca;color:#7f1d1d}
.hm-cell{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:700}
.mono{font-family:'DM Mono',monospace}
.ai-rec{border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;border:1px solid}
.ai-rec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ai-rec.predict{background:#f0f6ff;border-color:#bfdbfe}
.ai-rec.predict::before{background:linear-gradient(90deg,#5ba3f5,#818cf8)}
.ai-rec.prescribe{background:#f0fdf4;border-color:#bbf7d0}

.rp-footer{padding:12px 18px;border-top:1px solid #e2e8f0;flex-shrink:0;font-size:10px;color:#94a3b8;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .22s ease}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.pls{animation:pulse 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

/* Modal */

var fmt   = function(n){return new Intl.NumberFormat('id-ID').format(n);};
var fmtRp = function(n){return 'Rp '+fmt(n);};
var fmtK  = function(n){return n>=1e9?(n/1e9).toFixed(1)+'M':n>=1e6?(n/1e6).toFixed(1)+'jt':n>=1e3?(n/1e3).toFixed(0)+'rb':String(n);};

function spark(hist,up,w,h){
  w=w||80;h=h||32;
  var mn=Math.min.apply(null,hist),mx=Math.max.apply(null,hist),r=mx-mn||1;
  var pts=hist.map(function(v,i){return (i/(hist.length-1)*w)+','+(h-((v-mn)/r)*(h-6)-3);}).join(' ');
  var col=up===true?'#ef4444':up===false?'#16a34a':'#d97706';
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function trendTag(c){
  var sign=c.trend==='up'?'↑ +':c.trend==='down'?'↓ −':'→ ';
  var col=c.trend==='up'?'color:#ef4444':c.trend==='down'?'color:#16a34a':'color:#d97706';
  return '<span style="font-size:11px;font-weight:700;'+col+'">'+sign+c.ch+'%</span>';
}

var M = {
  cur:null, step:0, data:{}, total:0,
  open:function(flowId,initData){
    M.cur=flowId; M.step=0; M.data=Object.assign({},AI_DEFAULTS[flowId]||{},initData||{});
    var flow=FLOWS[flowId]; M.total=flow?flow.length:1;
    M.render();
    document.getElementById('mo').classList.add('show');
  },
  close:function(){
    document.getElementById('mo').classList.remove('show');
    M.cur=null; M.step=0; M.data={};
  },
  next:function(){
    if(!M.validate()) return;
    M.collect(); M.step++; M.render();
    document.getElementById('mb').scrollTop=0;
  },
  prev:function(){M.step--;M.render();document.getElementById('mb').scrollTop=0;},
  validate:function(){
    var required=document.querySelectorAll('#mb [data-required]');
    var ok=true;
    required.forEach(function(el){
      if(!el.value||!el.value.trim()){el.classList.add('err');ok=false;}
      else{el.classList.remove('err');}
    });
    var errEl=document.getElementById('mo-val-err');
    if(errEl) errEl.style.display=ok?'none':'block';
    return ok;
  },
  collect:function(){
    var fields=document.querySelectorAll('#mb [data-field]');
    fields.forEach(function(el){M.data[el.getAttribute('data-field')]=el.value;});
  },
  render:function(){
    var flow=FLOWS[M.cur];
    if(!flow||!flow[M.step]){M.close();return;}
    document.getElementById('mb').innerHTML=flow[M.step](M.data,M.step,M.total);
    M.bindStep();
  },
  bindStep:function(){
    var nb=document.getElementById('mo-next');
    var pb=document.getElementById('mo-prev');
    var cl=document.getElementById('mo-close');
    var sb=document.getElementById('mo-submit');
    var lb=document.getElementById('mo-load-btn');
    if(nb) nb.onclick=M.next;
    if(pb) pb.onclick=M.prev;
    if(cl) cl.onclick=M.close;
    if(sb) sb.onclick=function(){M.collect();if(!M.validate())return;M.step++;M.render();document.getElementById('mb').scrollTop=0;};
    if(lb) lb.onclick=function(){
      lb.disabled=true;
      lb.innerHTML='<span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin-right:6px"></span> Memproses...';
      lb.style.opacity='.7';
      setTimeout(function(){M.next();},2200);
    };
    document.querySelectorAll('#mb [data-flow]').forEach(function(el){
      el.onclick=function(){M.open(el.getAttribute('data-flow'));};
    });
  }
};

function mHeader(title,step,total,showClose){
  var dots='';
  for(var i=0;i<total;i++) dots+='<div class="step-dot'+(i===step?' active':'')+'"></div>';
  var aiNote='';
  if(step===0&&M.cur&&AI_DEFAULTS&&AI_DEFAULTS[M.cur]&&Object.keys(AI_DEFAULTS[M.cur]).length>0){
    aiNote='<div style="margin:8px 22px 0;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:6px;font-size:11px;color:#15803d;font-weight:600">'+
      '<span style="font-size:13px">✨</span> Form diisi otomatis oleh AI — semua field dapat diedit'+

  }
  return '<div class="mo-hdr">'+
    '<div>'+
      '<div style="font-size:16px;font-weight:800;color:#1e293b">'+esc(title)+'</div>'+
      (total>1?'<div style="font-size:11px;color:#94a3b8">Langkah '+(step+1)+' dari '+total+'</div>':'')+'</div>'+
    '<button id="mo-close" class="tap" style="width:32px;height:32px;background:#f8fafc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#64748b;border:1px solid #e2e8f0">&#x2715;</button>'+
  '</div>'+

  '<div id="mo-val-err" style="display:none;margin:0 22px;padding:8px 12px;background:#fee2e2;border-radius:8px;font-size:12px;color:#dc2626;font-weight:600">&#9888;&#65039; Harap lengkapi semua field bertanda *</div>'+

function mFooter(prevLabel,nextLabel,nextId,prevId,isLoad,isFinal){

  return '<div class="mo-footer"><div style="display:flex;gap:8px">'+prevBtn+nextBtn+'</div></div>';

function fieldHtml(label,id,type,required,placeholder,options,defaultVal){
  type=type||'text';
  var req=required?'data-required="1" ':'';
  var star=required?'<span style="color:#ef4444">*</span>':'';
  var val=(M.data&&M.data[id]!==undefined&&M.data[id]!=='') ? M.data[id] : (defaultVal||'');
  var input='';
  if(type==='select'){
    var opts=(options||[]).map(function(o){var v=o.v||o,l=o.l||o;return '<option value="'+esc(v)+'"'+(val&&v===val?' selected':'')+'>'+esc(l)+'</option>';}).join('');
    input='<select id="'+id+'" data-field="'+id+'" '+req+' style="width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;color:#1e293b"><option value="">Pilih...</option>'+opts+'</select>';
  } else if(type==='textarea'){
    input='<textarea id="'+id+'" data-field="'+id+'" '+req+' rows="3" placeholder="'+esc(placeholder||'')+'" style="width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;color:#1e293b;resize:none">'+esc(val)+'</textarea>';
  } else {
    input='<input id="'+id+'" data-field="'+id+'" type="'+type+'" '+req+' placeholder="'+esc(placeholder||'')+'" value="'+esc(val)+'" style="width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;color:#1e293b"/>';
  }
  return '<div class="field-wrap"><label>'+esc(label)+' '+star+'</label>'+input+'</div>';
}

/* ═══ RENDER ═══ */
function renderApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  buildSidebar();
  buildTopbar();
  buildContent();
  buildAIPanel();
  bindAll();
}

function bindAll(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.addEventListener('click',function(){setState({tab:el.getAttribute('data-nav')});});
  });
  document.querySelectorAll('[data-flow]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();M.open(el.getAttribute('data-flow'));});
  });
  document.querySelectorAll('[data-ai-tab]').forEach(function(el){
    el.addEventListener('click',function(){setState({tab:'ai',aiTab:el.getAttribute('data-ai-tab')});});
  });
  document.querySelectorAll('[data-harga-sel]').forEach(function(el){
    el.addEventListener('click',function(){setState({hargaSel:parseInt(el.getAttribute('data-harga-sel')),tab:'data'});});
  });
  var lb=document.getElementById('logout-btn');
  if(lb) lb.addEventListener('click',function(){setState({user:null,tab:'beranda',hargaSel:0,aiTab:'recs'});});
}
