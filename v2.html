<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0c0a09;font-family:'Plus Jakarta Sans',sans-serif}
#app{min-height:100vh;display:flex;justify-content:center;background:#0c0a09}
.shell{width:100%;max-width:430px;min-height:100vh;background:#fafaf9;position:relative;box-shadow:0 0 80px rgba(0,0,0,.6)}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
input,button,select{font-family:inherit;border:none;background:none;cursor:pointer}
.tap{transition:transform .12s;cursor:pointer;user-select:none}
.tap:active{transform:scale(.97)}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.shadow-card{box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 1px rgba(0,0,0,.05)}
.progress{transition:width .5s ease}

/* Header gradient */
.gh{background:linear-gradient(145deg,#14532d 0%,#166534 55%,#15803d 100%)}

/* AI pill */
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.ai-badge.blue{background:rgba(56,130,220,.15);color:#5ba3f5;border:1px solid rgba(56,130,220,.25)}
.ai-badge.green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.ai-badge.amber{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.ai-badge.red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}

/* Confidence ring */
.conf-ring{position:relative;flex-shrink:0}
.conf-ring svg{transform:rotate(-90deg)}
.conf-ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500}

/* AI recommendation card */
.ai-card{border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ai-card.predict::before{background:linear-gradient(90deg,#5ba3f5,#818cf8)}
.ai-card.prescribe::before{background:linear-gradient(90deg,#4ade80,#34d399)}
.ai-card.warn::before{background:linear-gradient(90deg,#f87171,#fb923c)}
.ai-card-bg{background:#fff;border:1px solid #e8e6e0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ai-card-warn{background:#fff5f5;border:1px solid #fecaca}
.ai-card-prescribe{background:#f0fdf4;border:1px solid #bbf7d0}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #f0ece8;display:flex;z-index:50;box-shadow:0 -1px 0 rgba(0,0,0,.05)}
.tab-content{height:100vh;overflow-y:auto;padding-bottom:72px}

/* Stat chip */
.stat-chip{background:rgba(255,255,255,.12);border-radius:12px;padding:8px 12px;text-align:center}

/* Progress ring anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease forwards;opacity:0}
.d1{animation-delay:.04s}.d2{animation-delay:.09s}.d3{animation-delay:.14s}.d4{animation-delay:.19s}

/* Pulse dot */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pls{animation:pulse 2s ease-in-out infinite}

/* Shimmer for "AI thinking" */
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
.thinking{background:linear-gradient(90deg,#f0ece8 25%,#e8e4dd 50%,#f0ece8 75%);background-size:600px 100%;animation:shimmer 1.5s infinite}

/* Early warning severity */
.ew-critical{background:#fff0f0;border-left:4px solid #ef4444;border-radius:0 12px 12px 0}
.ew-high{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 12px 12px 0}
.ew-medium{background:#f0f9ff;border-left:4px solid #3b82f6;border-radius:0 12px 12px 0}

/* Heatmap cell */
.hm-surplus{background:#bbf7d0;color:#14532d}
.hm-seimbang{background:#fef9c3;color:#713f12}
.hm-defisit{background:#fecaca;color:#7f1d1d}

/* Confidence bar */
.conf-bar-track{height:4px;border-radius:2px;background:#e8e4dd;overflow:hidden}
.conf-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}

/* Modal System Mobile */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.modal-box { background: #fff; width: 100%; max-width: 430px; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 24px rgba(0,0,0,0.1); overflow: hidden; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); color: #1c1a17; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-hdr { padding: 20px 24px; border-bottom: 1px solid #e8e4dd; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 2; }
.modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
.modal-ftr { padding: 16px 24px; background: #f9fafb; border-top: 1px solid #e8e4dd; display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
.btn-primary { background: #1c1a17; color: #fff; font-weight: 700; padding: 14px; border-radius: 14px; text-align: center; width: 100%; font-size: 15px; }
.btn-ghost { color: #6b7280; font-weight: 600; padding: 12px; text-align: center; width: 100%; font-size: 14px; }

.tech-spec { font-family: 'DM Mono', monospace; font-size: 11px; background: #f1f5f9; padding: 12px; border-radius: 10px; color: #475569; margin-top: 12px; border-left: 3px solid #64748b; line-height: 1.5; }
.flow-step { display: flex; gap: 14px; margin-bottom: 20px; position: relative; }
.flow-step:not(:last-child)::after { content: ''; position: absolute; left: 11px; top: 24px; bottom: -8px; width: 2px; background: #e2e8f0; }
.step-icon { width: 24px; height: 24px; border-radius: 50%; background: #3b82f6; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; z-index: 1; }
.step-done { background: #10b981; }

/* AR Scan Simulator */
.ar-view { background: #000; border-radius: 20px; position: relative; overflow: hidden; height: 320px; margin-bottom: 16px; border: 2px solid #4ade80; }
.ar-overlay { position: absolute; inset: 0; pointer-events: none; border: 2px dashed rgba(74,222,128,0.4); margin: 40px; border-radius: 12px; }
.ar-bbox { position: absolute; border: 2px solid #4ade80; background: rgba(74,222,128,0.1); border-radius: 4px; padding: 4px; animation: arPulse 1.5s infinite; }
@keyframes arPulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
.ar-label { background: #4ade80; color: #000; font-size: 9px; font-weight: 800; padding: 2px 4px; border-radius: 2px; margin-bottom: 2px; }
.ar-stat { position: absolute; bottom: 12px; left: 12px; right: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ar-chip { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border-radius: 8px; padding: 6px; border: 1px solid rgba(255,255,255,0.1); }

/* Mobile Trace Log */
#ai-trace-mob { background: #0a0f0a; padding: 12px; font-family: 'DM Mono', monospace; font-size: 9px; color: #4ade80; height: 120px; overflow-y: auto; border-top: 1px solid #1c1f1c; margin: 10px -16px -16px; border-radius: 0 0 16px 16px; }
.trace-line { margin-bottom: 4px; display: flex; gap: 6px; opacity: 0.7; animation: traceFade 0.3s ease; }
@keyframes traceFade { from { opacity: 0; transform: translateX(-4px); } to { opacity: 0.7; transform: translateX(0); } }
.trace-ts { color: #6b7280; flex-shrink: 0; }
.trace-tag { color: #fbbf24; font-weight: 700; }

const fmt   = n => new Intl.NumberFormat('id-ID').format(n);
const fmtRp = n => 'Rp ' + fmt(n);
const fmtK  = n => n>=1e9?(n/1e9).toFixed(1)+'M':n>=1e6?(n/1e6).toFixed(1)+'jt':n>=1e3?(n/1e3).toFixed(0)+'rb':String(n);
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function confRing(val, color='#5ba3f5', size=44) {
  const r=16, circ=2*Math.PI*r, dash=circ*(val/100), gap=circ-dash;
  return `<div class="conf-ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="${r}" fill="none" stroke="#e8e4dd" stroke-width="3"/>
      <circle cx="20" cy="20" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="${dash} ${gap}"/>
    </svg>
    <div class="val" style="color:${color};font-size:9px">${val}%</div>
  </div>`;
}

function sparkline(hist, up, w=60, h=28) {
  const mn=Math.min(...hist),mx=Math.max(...hist),r=mx-mn||1;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*w},${h-((v-mn)/r)*(h-6)-3}`).join(' ');
  const col=up===true?'#ef4444':up===false?'#16a34a':'#d97706';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function trendTag(c) {
  const sign=c.trend==='up'?'↑ +':c.trend==='down'?'↓ −':'→ ';
  const col=c.trend==='up'?'text-red-500':c.trend==='down'?'text-green-600':'text-amber-500';
  return `<span class="${col} text-xs font-bold">${sign}${c.ch}%</span>`;
}

let traceIntervalMob;
function startTraceMob() {
  if(traceIntervalMob) clearInterval(traceIntervalMob);
  const logBox = document.getElementById('ai-trace-mob');
  if(!logBox) return;
  const logs = [
    "[EDGE] Processing local soil data...",
    "[MODEL] Running ARIMA price estimator...",
    "[SYNC] Ingesting KMP transaction #8421...",
    "[OPTI] Simplex re-routing fleet #0812...",
    "[RISK] X-Gboost: Credit score 0.94 probability...",
    "[AI] Analyzing biomass NDVI satellite..."
  ];
  traceIntervalMob = setInterval(() => {
    const line = document.createElement('div');
    line.className = 'trace-line';
    const ts = new Date().toLocaleTimeString('id-ID', {hour12:false, minute:'2-digit', second:'2-digit'});
    const msg = logs[Math.floor(Math.random()*logs.length)];
    line.innerHTML = `<span class="trace-ts">${ts}</span> <span class="trace-tag">${msg.split(' ')[0]}</span> ${msg.split(' ').slice(1).join(' ')}`;
    logBox.prepend(line);
    if(logBox.childNodes.length > 10) logBox.lastChild.remove();
  }, 2500);
}

function manualAction(type, target) {
  let t='Operasi Manual', b='', f='';
  const u=S.user;
  b = `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 12px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:#92400e">⚠️ AKSI MANUAL — Tanpa Rekomendasi AI</div>
    <div style="font-size:11px;color:#a16207;margin-top:2px">Keputusan ini dibuat berdasarkan penilaian manusia terhadap data mentah.</div>
  </div>
  <div style="font-size:13px;font-weight:700;margin-bottom:8px">Target: ${target}</div>
  <div style="background:#f7f6f3;border-radius:12px;padding:12px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;margin-bottom:6px">Catatan Operasi (Wajib)</div>
    <textarea id="manual-note" placeholder="Jelaskan alasan dan rencana eksekusi Anda..." style="width:100%;height:60px;border:1px solid #e8e4dd;border-radius:8px;padding:8px;font-size:12px;resize:none;font-family:inherit"></textarea>
  </div>
  <div style="margin-bottom:12px">
    <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">
      <input type="checkbox" id="manual-check" style="margin-top:2px">
      <span style="font-size:11px;color:#6b7280">Saya telah memverifikasi data di lapangan dan bertanggung jawab penuh atas keputusan ini.</span>
    </label>
  </div>`;
  f = `<button class="btn-ghost" onclick="closeModal()">Batal</button>
  <button class="btn-primary" onclick="submitManual('${type}','${target}')">Eksekusi [MANUAL-EXEC] →</button>`;
  t = type.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()) + ': ' + target;
  openModal(t, b, f);
}

function submitManual(type, target) {
  const note = document.getElementById('manual-note');
  const check = document.getElementById('manual-check');
  if(!note || !note.value.trim()) { alert('Mohon isi catatan operasi.'); return; }
  if(!check || !check.checked) { alert('Mohon centang checklist verifikasi.'); return; }
  confirmFlow('Operasi Manual Berhasil', `[MANUAL-EXEC] ${type}: ${target}\n\nCatatan: ${note.value}\n\nDicatat dalam audit log.`);
}

/* ═══════════════════════════════════ */
function render() {
  const shell=document.getElementById('shell');
  if(!S.user){shell.innerHTML=renderLogin();bindLogin();return;}
  const screens={beranda:renderBeranda,ai:renderAI,data:renderData,operasi:renderOperasi,akun:renderAkun,admin:renderAdmin};
  const fn = (S.user.role === 'system_admin' && S.tab === 'beranda') ? renderAdmin : (screens[S.tab]||renderBeranda);
  shell.innerHTML=`<div class="tab-content">${fn()}</div>${renderNav()}`;
  bindApp();
}

/* ═══════════════════════════════════ */
function bindLogin(){
  document.querySelectorAll('[data-login]').forEach(el=>el.addEventListener('click',()=>{
    set({user:USERS.find(x=>x.role===el.dataset.login),tab:'beranda'});
  }));
}
function bindApp(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>set({tab:el.dataset.nav})));
  const lb=document.getElementById('logout-btn');
  if(lb)lb.addEventListener('click',()=>set({user:null,tab:'beranda',hargaSel:0,matchTab:'heatmap'}));
  document.querySelectorAll('[data-harga-sel]').forEach(el=>el.addEventListener('click',()=>set({hargaSel:parseInt(el.dataset.hargaSel)})));
  document.querySelectorAll('[data-match-tab]').forEach(el=>el.addEventListener('click',()=>set({matchTab:el.dataset.matchTab})));
}

/* ═══════════════════════════════════ */
function deleteUser(id) {
  if(confirm("Hapus user ini?")) {
    const idx = USERS.findIndex(u=>u.id===id);
    if(idx>-1) USERS.splice(idx,1);
    render();
  }
}
function approveAI(id) {
  confirmFlow("AI Action Approved", "Rekomendasi telah disetujui dan dieksekusi oleh sistem.");
}

        <div class="tech-spec">LSTM Engine: Penurunan yield 1.2 Ton/Ha diproyeksikan pada panen akhir bulan.<br>Rekomendasi: Alihkan sourcing ke Jawa Timur.</div>
        <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:8px;margin-top:8px"><div style="font-size:10px;color:#1d4ed8;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">💡 Apa artinya ini?</div><div style="display:none;font-size:10px;color:#3b82f6;margin-top:4px;line-height:1.5">Penurunan produksi jagung Kediri (18%) akan mengganggu supply pakan ternak regional. Diperlukan sourcing tambahan segera.</div></div>
        ${supBlock('<div style="font-size:11px;font-weight:700;margin-top:12px;margin-bottom:4px">Opsi Sourcing Mitigasi</div><select style="width:100%;border:1px solid #e8e4dd;border-radius:8px;padding:8px;font-size:12px;font-family:inherit"><option>Alihkan ke Gudang Jatim (+ 5,000 ton)</option><option>Alihkan ke Gudang Jabar (+ 2,000 ton)</option><option>Hanya tingkatkan Safety Buffer</option></select>')}`;
    f = `<button class="btn-ghost" onclick="closeModal()">Batal</button><button class="btn-primary" onclick="window._vExec('Sourcing Diaktifkan','Sourcing alternatif dialihkan dan parameter safety buffer disesuaikan.')">Eksekusi Mitigasi </button>`;
  }
  else {
    b = `<div style="text-align:center;padding:16px 0"><div style="font-size:36px;margin-bottom:8px">\u2705</div><div style="font-weight:700">${name}</div><div style="font-size:12px;color:#6b7280;margin-top:4px">Aksi dilakukan.</div></div>`;
  }

  openModal(t, b, f);
}

function confirmFlow(title, sub) {
  openModal(title, `<div style="text-align:center;padding:16px 0"><div style="width:72px;height:72px;background:#16a34a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:36px;box-shadow:0 8px 16px rgba(22,163,74,.2)">&#10003;</div><div style="font-size:18px;font-weight:800;color:#1c1a17;margin-bottom:8px">${title}</div><div style="font-size:13px;color:#6b7280;line-height:1.6">${sub}</div></div>`, '<button class="btn-primary" onclick="closeModal()">Tutup</button>');
}

render();
</script>
</body>
