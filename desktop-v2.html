*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f8fafc;font-family:'Plus Jakarta Sans',sans-serif;color:#1e293b}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
input,button{font-family:inherit;border:none;cursor:pointer;background:none}
.tap{transition:all .12s;cursor:pointer}
.tap:hover{opacity:.88}
.tap:active{transform:scale(.98)}

#layout{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;flex-shrink:0;background:white;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #e2e8f0}
#content{flex:1;overflow-y:auto;background:#f8fafc;min-width:0}
#ai-panel{width:300px;flex-shrink:0;background:#fff;border-left:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}

.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .12s;margin-bottom:2px;color:#64748b;font-size:13px;font-weight:500}
.sb-nav-item:hover{background:#f8fafc;color:#1e293b}
.sb-nav-item.active{background:#f0fdf4;color:#15803d;font-weight:700}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.kpi-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.panel.flush{padding:0;overflow:hidden}
.page{padding:24px 28px 32px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.grid-32{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:700;color:#1e293b}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 14px;background:#f8fafc;color:#6b7280;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.data-table td{padding:11px 14px;border-bottom:1px solid #f0ede8;color:#334155;vertical-align:middle}
.data-table tr:hover td{background:#f8fafc}
.data-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.bg-green{background:#dcfce7;color:#15803d}
.bg-red{background:#fee2e2;color:#dc2626}
.bg-amber{background:#fef9c3;color:#a16207}
.bg-blue{background:#dbeafe;color:#1d4ed8}
.bg-purple{background:#ede9fe;color:#6d28d9}
.bg-gray{background:#f3f4f6;color:#6b7280}
.ai-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:12px}
.ai-pill.predict{background:rgba(59,130,246,.1);color:#2563eb;border:1px solid rgba(59,130,246,.2)}
.ai-pill.prescribe{background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.2)}
.ai-pill.warn{background:rgba(239,68,68,.1);color:#dc2626;border:1px solid rgba(239,68,68,.2)}
.conf-track{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:4px}
.conf-fill{height:100%;border-radius:3px}
.hm-surplus{background:#bbf7d0;color:#14532d}
.hm-seimbang{background:#fef9c3;color:#713f12}
.hm-defisit{background:#fecaca;color:#7f1d1d}
.hm-cell{border-radius:10px;padding:12px 14px;font-size:12px;font-weight:700}
.mono{font-family:'DM Mono',monospace}
.ai-rec{border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;border:1px solid}
.ai-rec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ai-rec.predict{background:#f0f6ff;border-color:#bfdbfe}
.ai-rec.predict::before{background:linear-gradient(90deg,#5ba3f5,#818cf8)}
.ai-rec.prescribe{background:#f0fdf4;border-color:#bbf7d0}
.ai-rec.prescribe::before{background:linear-gradient(90deg,#4ade80,#34d399)}
.ai-rec.warn{background:#fff5f5;border-color:#fecaca}

.role-card:hover{transform:translateX(4px)}
.rp-header{padding:16px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rp-body{padding:16px 18px;flex:1;overflow-y:auto}
.rp-footer{padding:12px 18px;border-top:1px solid #e2e8f0;flex-shrink:0;font-size:10px;color:#94a3b8;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .22s ease}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.pls{animation:pulse 2s ease-in-out infinite}

/* Modal System */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: #fff; border-radius: 20px; width: 100%; max-width: 500px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1); color: #1e293b; }
@keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-hdr { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-body { padding: 24px; overflow-y: auto; }
.modal-ftr { padding: 16px 24px; background: #f9fafb; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
.btn-primary { background: #1e293b; color: #fff; font-weight: 700; padding: 10px 20px; border-radius: 10px; transition: all 0.2s; }
.btn-primary:active { transform: scale(0.96); }
.btn-ghost { color: #6b7280; font-weight: 600; padding: 10px 16px; border-radius: 10px; }

/* LogiRoute / Tech Details */
.tech-spec { font-family: 'DM Mono', monospace; font-size: 11px; background: #f1f5f9; padding: 10px; border-radius: 8px; color: #475569; margin-top: 10px; border-left: 3px solid #64748b; }
.flow-step { display: flex; gap: 12px; margin-bottom: 16px; position: relative; }
.flow-step:not(:last-child)::after { content: ''; position: absolute; left: 11px; top: 24px; bottom: -8px; width: 2px; background: #e2e8f0; }
.step-icon { width: 24px; height: 24px; border-radius: 50%; background: #3b82f6; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; z-index: 1; }
.step-done { background: #10b981; }

/* AI Trace Log */
#ai-trace { background: #0a0f0a; padding: 12px; font-family: 'DM Mono', monospace; font-size: 10px; color: #4ade80; height: 180px; overflow-y: auto; border-top: 1px solid #1c1f1c; }
.trace-line { margin-bottom: 4px; display: flex; gap: 8px; opacity: 0.8; animation: traceFade 0.3s ease; }
@keyframes traceFade { from { opacity: 0; transform: translateX(-4px); } to { opacity: 0.8; transform: translateX(0); } }
.trace-ts { color: #6b7280; flex-shrink: 0; }
.trace-tag { color: #fbbf24; font-weight: 700; }

/* SVG Route Visualizer */
.route-map { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; margin: 10px 0; position: relative; overflow: hidden; height: 180px; }
.map-node { fill: #1e293b; stroke: #fff; stroke-width: 2; cursor: pointer; }
.map-node.pulse { animation: mapPulse 2s infinite; }
@keyframes mapPulse { 0% { r: 4; opacity: 1; } 50% { r: 10; opacity: 0; } 100% { r: 4; opacity: 1; } }
.map-line { fill: none; stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 4, 4; animation: mapDash 10s linear infinite; }
@keyframes mapDash { to { stroke-dashoffset: -100; } }

/* Main Chart Shading */
.chart-area { fill: url(#chartGradient); }
.chart-pred { fill: rgba(59,130,246,0.1); stroke: #3b82f6; stroke-dasharray: 4,4; }

function spark(hist, up, w, h) {
  w = w||80; h = h||32;
  var mn=Math.min.apply(null,hist), mx=Math.max.apply(null,hist), r=mx-mn||1;
  var pts=hist.map(function(v,i){return (i/(hist.length-1)*w)+','+(h-((v-mn)/r)*(h-6)-3);}).join(' ');
  var col=up===true?'#ef4444':up===false?'#16a34a':'#d97706';
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function bigChart(hist, trend) {
  var W=480, H=80;
  var mn=Math.min.apply(null,hist), mx=Math.max.apply(null,hist), r=mx-mn||1;
  // Last point is projected
  var realHist = hist.slice(0, -1);
  var pts=realHist.map(function(v,i){return (i/(hist.length-1)*W)+','+(H-((v-mn)/r)*(H-10)-5);}).join(' ');
  
  var lastRealX = (realHist.length-1)/(hist.length-1)*W;
  var lastRealY = H-((realHist[realHist.length-1]-mn)/r)*(H-10)-5;
  var predX = W;
  var predY = H-((hist[hist.length-1]-mn)/r)*(H-10)-5;
  
  var col=trend==='up'?'#ef4444':trend==='down'?'#16a34a':'#d97706';
  var dots=realHist.map(function(v,i){
    var x=i/(hist.length-1)*W, y=H-((v-mn)/r)*(H-10)-5;
    return '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+col+'"/><circle cx="'+x+'" cy="'+y+'" r="1.5" fill="white"/>';
  }).join('');

  return '<svg width="100%" viewBox="0 0 '+W+' '+(H+8)+'" style="overflow:visible">'+
    '<defs><linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.2"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+
    '<polygon points="0,'+(H+4)+' '+pts+' '+lastRealX+','+(H+4)+'" class="chart-area"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<line x1="'+lastRealX+'" y1="'+lastRealY+'" x2="'+predX+'" y2="'+predY+'" stroke="'+col+'" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>'+
    '<circle cx="'+predX+'" cy="'+predY+'" r="4" fill="'+col+'" opacity="0.4" class="pls"/>'+
    dots+'</svg>';
}

function trendBadge(c) {
  var sign=c.trend==='up'?'↑ +':c.trend==='down'?'↓ −':'→ ';
  var cls=c.trend==='up'?'bg-red':c.trend==='down'?'bg-green':'bg-amber';
  return '<span class="badge '+cls+'">'+sign+c.ch+'%</span>';

let traceInterval;
function startTrace() {
  if(traceInterval) clearInterval(traceInterval);
  const logBox = document.getElementById('ai-trace');
  if(!logBox) return;
  const logs = [
    "[PREDICT] Analyzing Jabar-NTT supply chain...",
    "[AGENT] Matching surplus Cilangkap to NTT demand...",
    "[MODEL] LSTM running price forecast (Epoch 42)...",
    "[DATA] Ingesting SimKopdes weekly transaction...",
    "[OPTI] Simplex algorithm finding min-cost path...",
    "[GOV] Detecting regional inflation threat +12%...",
    "[CROP] Satellite NDVI data: 88% biomass health...",
    "[MATCH] 12 nodes connected in PanenMatch grid..."
  ];
  traceInterval = setInterval(() => {
    const line = document.createElement('div');
    line.className = 'trace-line';
    const ts = new Date().toLocaleTimeString('id-ID', {hour12:false});
    const msg = logs[Math.floor(Math.random()*logs.length)];
    line.innerHTML = `<span class="trace-ts">${ts}</span> <span class="trace-tag">${msg.split(' ')[0]}</span> ${msg.split(' ').slice(1).join(' ')}`;
    logBox.prepend(line);
    if(logBox.childNodes.length > 20) logBox.lastChild.remove();
  }, 2500);
}

function submitManual(type, target) {
  var note = document.getElementById('manual-note');
  var check = document.getElementById('manual-check');
  if(!note || !note.value.trim()) { alert('Mohon isi catatan operasi.'); return; }
  if(!check || !check.checked) { alert('Mohon centang checklist verifikasi.'); return; }
  confirmFlow('Operasi Manual Berhasil', '[MANUAL-EXEC] ' + type + ': ' + target + ' — Catatan: ' + note.value);
}

function bindApp() {
  document.querySelectorAll('[data-nav]').forEach(function(el){

  document.querySelectorAll('[data-harga-sel]').forEach(function(el){

  var lb=document.getElementById('logout-btn');
  var lb2=document.getElementById('logout-btn2');

}

function deleteUser(id) {
  if(confirm("Apakah Anda yakin ingin menghapus user ini?")) {
    var idx = USERS.findIndex(function(u){return u.id===id});
    if(idx > -1) USERS.splice(idx, 1);
    renderApp();
  }
}

function editUser(id) {
  var usr = USERS.find(function(u){return u.id===id});
  var body = '<div style="display:flex;flex-direction:column;gap:12px">'+
    '<div><label style="font-size:11px;font-weight:700">NAMA</label><input id="edit-name" class="login-input" value="'+usr.name+'" style="margin-top:4px"></div>'+
    '<div><label style="font-size:11px;font-weight:700">LOKASI</label><input id="edit-loc" class="login-input" value="'+usr.loc+'" style="margin-top:4px"></div>'+
    '</div>';
  var footer = '<button class="btn-ghost" onclick="closeModal()">Batal</button><button class="btn-primary" onclick="saveUser('+id+')">Simpan Perubahan</button>';
  openModal("Edit User", body, footer);
}

function saveUser(id) {
  var usr = USERS.find(function(u){return u.id===id});
  usr.name = document.getElementById('edit-name').value;
  usr.loc = document.getElementById('edit-loc').value;
  usr.init = usr.name.split(' ').map(function(s){return s[0]}).join('').substring(0,2).toUpperCase();
  closeModal();
  renderApp();
}

function addUser() {
  var body = '<div style="display:flex;flex-direction:column;gap:12px">'+
    '<div><label style="font-size:11px;font-weight:700">NAMA LENGKAP</label><input id="new-name" class="login-input" placeholder="Nama Baru" style="margin-top:4px"></div>'+
    '<div><label style="font-size:11px;font-weight:700">ROLE</label><select id="new-role" class="login-input" style="margin-top:4px"><option value="petani">Petani</option><option value="koperasi">Koperasi</option><option value="pembeli">Pembeli</option></select></div>'+
    '<div><label style="font-size:11px;font-weight:700">LOKASI</label><input id="new-loc" class="login-input" placeholder="Kota, Provinsi" style="margin-top:4px"></div>'+
    '</div>';
  var footer = '<button class="btn-ghost" onclick="closeModal()">Batal</button><button class="btn-primary" onclick="confirmAddUser()">Tambah User</button>';
  openModal("Tambah User Baru", body, footer);
}

function confirmAddUser() {
  var name = document.getElementById('new-name').value;
  var role = document.getElementById('new-role').value;
  var loc = document.getElementById('new-loc').value;
  if (!name || !loc) return alert("Mohon isi semua field");
  
  var newUser = {
    id: Date.now(),
    role: role,
    name: name,
    init: name.split(' ').map(function(s){return s[0]}).join('').substring(0,2).toUpperCase(),
    loc: loc,
    join: 'Apr 2026'
  };
  USERS.push(newUser);
  closeModal();
  renderApp();
}

function approveAllAI() {
  confirmFlow("Mass Approval Success", "Semua rekomendasi AI telah disetujui dan instruksi telah dikirim ke unit terkait.");
}

// Boot
renderLogin();
</script>
</body>
</html>
