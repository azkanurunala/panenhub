*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0f0a;font-family:'Plus Jakarta Sans',sans-serif}
#app{min-height:100vh;display:flex;justify-content:center;background:#0a0f0a}
.shell{width:100%;max-width:430px;min-height:100vh;background:#f7f6f3;position:relative;box-shadow:0 0 80px rgba(0,0,0,.6)}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
input,button,select,textarea{font-family:inherit;border:none;cursor:pointer;background:none;outline:none}
.tap{transition:all .12s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tap:active{transform:scale(.97)}
.tab-content{height:100vh;overflow-y:auto;padding-bottom:72px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #ede9e3;display:flex;z-index:50}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .28s ease forwards;opacity:0}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.pls{animation:pulse 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.conf-track{height:4px;border-radius:2px;background:#e8e4dd;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;transition:width .8s ease}
.ai-rec{border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid;position:relative;overflow:hidden}
.ai-rec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ai-rec.predict{background:#f0f6ff;border-color:#bfdbfe}.ai-rec.predict::before{background:linear-gradient(90deg,#5ba3f5,#818cf8)}
.ai-rec.prescribe{background:#f0fdf4;border-color:#bbf7d0}.ai-rec.prescribe::before{background:linear-gradient(90deg,#4ade80,#34d399)}
.ai-rec.warn{background:#fff5f5;border-color:#fecaca}.ai-rec.warn::before{background:linear-gradient(90deg,#f87171,#fb923c)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.bg-green{background:#dcfce7;color:#15803d}.bg-red{background:#fee2e2;color:#dc2626}
.bg-amber{background:#fef9c3;color:#a16207}.bg-blue{background:#dbeafe;color:#1d4ed8}
.bg-gray{background:#f3f4f6;color:#6b7280}.bg-purple{background:#ede9fe;color:#6d28d9}
.mono{font-family:'DM Mono',monospace}
/* Modal */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mo.show{display:flex}
#mb{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.mo-hdr{padding:16px 18px 12px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
.mo-body{padding:16px 18px}
.mo-footer{padding:12px 18px 24px;border-top:1px solid #f0ede8;position:sticky;bottom:0;background:#fff}
.field-wrap{margin-bottom:12px}
.field-wrap label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:5px}
.field-wrap input,.field-wrap select,.field-wrap textarea{width:100%;background:#f7f6f3;border:1.5px solid #e8e4dd;border-radius:10px;padding:10px 12px;font-size:14px;color:#1c1a17;transition:border-color .15s}
.field-wrap input:focus,.field-wrap select:focus,.field-wrap textarea:focus{border-color:#16a34a;background:#fff}
.field-wrap input.err,.field-wrap select.err,.field-wrap textarea.err{border-color:#ef4444;background:#fff5f5}
.step-dots{display:flex;gap:5px;justify-content:center;padding:8px 0 4px}
.step-dot{width:6px;height:6px;border-radius:50%;background:#e8e4dd;transition:all .2s}
.step-dot.active{background:#16a34a;width:18px;border-radius:3px}
.load-ring{width:40px;height:40px;border:3px solid #e8e4dd;border-top-color:#16a34a;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
.success-icon{width:56px;height:56px;background:#f0fdf4;border:2px solid #bbf7d0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
.tech-card{background:#fff;border:1px solid #e8e4dd;border-radius:14px;padding:14px;margin-bottom:10px}
.tech-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.metric-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.metric-chip{background:#f7f6f3;border-radius:8px;padding:5px 8px;font-size:11px;color:#6b7280;font-weight:500}
.metric-chip strong{color:#1c1a17}

var fmt   = function(n){return new Intl.NumberFormat('id-ID').format(n);};
var fmtRp = function(n){return 'Rp '+fmt(n);};
var fmtK  = function(n){return n>=1e9?(n/1e9).toFixed(1)+'M':n>=1e6?(n/1e6).toFixed(1)+'jt':n>=1e3?(n/1e3).toFixed(0)+'rb':String(n);};
var esc   = function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};
var ac    = function(){return ROLE_ACCENT[(S.user&&S.user.role)]||'#5ba3f5';};

function spark(hist,up,w,h){
  w=w||60;h=h||26;
  var mn=Math.min.apply(null,hist),mx=Math.max.apply(null,hist),r=mx-mn||1;
  var pts=hist.map(function(v,i){return (i/(hist.length-1)*w)+','+(h-((v-mn)/r)*(h-6)-3);}).join(' ');
  var col=up===true?'#ef4444':up===false?'#16a34a':'#d97706';
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function trendTag(c){
  var sign=c.trend==='up'?'↑ +':c.trend==='down'?'↓ −':'→ ';
  var col=c.trend==='up'?'color:#ef4444':c.trend==='down'?'color:#16a34a':'color:#d97706';
  return '<span style="font-size:11px;font-weight:700;'+col+'">'+sign+c.ch+'%</span>';
}
function stBadge(s){
  var m={aktif:['Aktif','bg-green'],warning:['Perhatian','bg-amber'],hold:['Hold','bg-gray'],
    surplus:['Surplus','bg-green'],defisit:['Defisit','bg-red'],seimbang:['Seimbang','bg-amber'],
    dalam_perjalanan:['Dalam Perjalanan','bg-blue'],menunggu_pickup:['Menunggu Pickup','bg-amber'],selesai:['Selesai','bg-green'],
    confirmed:['Confirmed','bg-green'],pending:['Menunggu','bg-amber'],ai_match:['AI Match','bg-blue']};
  var x=m[s]||['—','bg-gray'];
  return '<span class="badge '+x[1]+'">'+x[0]+'</span>';
}
function confBar(val,col){
  col=col||'#3b82f6';
  return '<div class="conf-track"><div class="conf-fill" style="width:'+val+'%;background:'+col+'"></div></div>';
}
function aiPill(type){
  var m={predict:'Predictive AI',prescribe:'Prescriptive AI',warn:'Early Warning'};
  var c={predict:'background:rgba(59,130,246,.12);color:#2563eb;border:1px solid rgba(59,130,246,.2)',
         prescribe:'background:rgba(22,163,74,.12);color:#15803d;border:1px solid rgba(22,163,74,.2)',
         warn:'background:rgba(239,68,68,.12);color:#dc2626;border:1px solid rgba(239,68,68,.2)'};
  return '<span style="font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:10px;'+c[type]+'">'+m[type]+'</span>';
}
function aiCard(r){
  var col=r.type==='warn'?'#dc2626':r.type==='prescribe'?'#16a34a':'#3b82f6';
  return '<div class="ai-rec '+r.type+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'+aiPill(r.type)+
          '<span style="font-size:10px;color:#9c9a92">'+esc(r.label)+'</span>'+
        '</div>'+
        '<div style="font-size:13px;font-weight:700;color:#1c1a17;line-height:1.4">'+esc(r.title)+'</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div style="font-size:18px;font-weight:800;color:'+col+';font-family:DM Mono,monospace">'+r.conf+'%</div>'+
        '<div style="font-size:9px;color:#9c9a92">conf.</div>'+
      '</div>'+
    '</div>'+
    '<div style="font-size:12px;color:#6b6966;background:rgba(0,0,0,.03);border-radius:8px;padding:8px;line-height:1.6;margin-bottom:8px">'+esc(r.reason)+'</div>'+
    confBar(r.conf,col)+
    '<button class="tap" data-flow="'+r.flow+'" style="margin-top:8px;background:'+col+';color:#fff;font-size:12px;font-weight:700;padding:7px 14px;border-radius:10px">'+esc(r.action)+'</button>'+
  '</div>';
}
function kpiBox(icon,label,val,sub,color){
  color=color||'#1c1a17';
  return '<div style="background:#fff;border:1px solid #e8e4dd;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)">'+
    '<div style="font-size:20px;margin-bottom:5px">'+icon+'</div>'+
    '<div style="font-size:10px;font-weight:700;color:#9c9a92;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">'+label+'</div>'+
    '<div style="font-size:20px;font-weight:800;color:'+color+';font-family:DM Mono,monospace;line-height:1.1">'+val+'</div>'+
    '<div style="font-size:11px;color:#9c9a92;margin-top:3px">'+sub+'</div>'+
  '</div>';
}

var M = {
  cur: null,
  step: 0,
  data: {},
  total: 0,

  open: function(flowId, initData){
    M.cur = flowId;
    M.step = 0;
    M.data = Object.assign({}, AI_DEFAULTS[flowId]||{}, initData||{});
    var flow = FLOWS[flowId];
    M.total = flow ? flow.length : 1;
    M.render();
    document.getElementById('mo').classList.add('show');
  },

  close: function(){
    document.getElementById('mo').classList.remove('show');
    M.cur = null; M.step = 0; M.data = {};
  },

  next: function(){
    if(!M.validate()) return;
    M.collect();
    M.step++;
    M.render();
    document.getElementById('mb').scrollTop = 0;
  },

  prev: function(){
    M.step--;
    M.render();
    document.getElementById('mb').scrollTop = 0;
  },

  validate: function(){
    var required = document.querySelectorAll('#mb [data-required]');
    var ok = true;
    required.forEach(function(el){
      if(!el.value || !el.value.trim()){
        el.classList.add('err');
        ok = false;
      } else {
        el.classList.remove('err');
      }
    });
    var errEl = document.getElementById('mo-val-err');
    if(errEl) errEl.style.display = ok ? 'none' : 'block';
    return ok;
  },

  collect: function(){
    var fields = document.querySelectorAll('#mb [data-field]');
    fields.forEach(function(el){
      M.data[el.getAttribute('data-field')] = el.value;
    });
  },

  render: function(){
    var flow = FLOWS[M.cur];
    if(!flow || !flow[M.step]) { M.close(); return; }
    document.getElementById('mb').innerHTML = flow[M.step](M.data, M.step, M.total);
    M.bindStep();
  },

  bindStep: function(){
    var nb = document.getElementById('mo-next');
    var pb = document.getElementById('mo-prev');
    var cl = document.getElementById('mo-close');
    var sb = document.getElementById('mo-submit');
    var lb = document.getElementById('mo-load-btn');

    if(nb) nb.onclick = M.next;
    if(pb) pb.onclick = M.prev;
    if(cl) cl.onclick = M.close;
    if(sb) sb.onclick = function(){
      M.collect();
      if(!M.validate()) return;
      M.step++;
      M.render();
      document.getElementById('mb').scrollTop = 0;
    };
    if(lb) lb.onclick = function(){
      lb.disabled = true;
      lb.innerHTML = '<span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin-right:6px"></span> Memproses...';
      lb.style.opacity = '.7';
      setTimeout(function(){ M.next(); }, 2200);
    };

    // Bind dynamic flow buttons
    var flowBtns = document.querySelectorAll('#mb [data-flow]');
    flowBtns.forEach(function(el){
      el.onclick = function(){ M.open(el.getAttribute('data-flow')); };
    });
  }
};

function mHeader(title, step, total, showClose){
  var dots = '';
  for(var i=0;i<total;i++){
    dots += '<div class="step-dot'+(i===step?' active':'')+'"></div>';
  }
  var aiNote='';
  if(step===0 && M.cur && AI_DEFAULTS && AI_DEFAULTS[M.cur] && Object.keys(AI_DEFAULTS[M.cur]).length>0){
    aiNote='<div style="margin:8px 18px 0;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:6px;font-size:11px;color:#15803d;font-weight:600">'+
      '<span style="font-size:13px">✨</span> Form diisi otomatis oleh AI — semua field dapat diedit'+
    '</div>';
  }
  return '<div class="mo-hdr">'+
    '<div>'+
      '<div style="font-size:16px;font-weight:800;color:#1c1a17">'+esc(title)+'</div>'+
      (total>1?'<div style="font-size:11px;color:#9c9a92">Langkah '+(step+1)+' dari '+total+'</div>':'')+'</div>'+
    '<button id="mo-close" class="tap" style="width:32px;height:32px;background:#f7f6f3;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#6b7280">&#x2715;</button>'+
  '</div>'+
  (total>1?'<div class="step-dots">'+dots+'</div>':'')+
  '<div id="mo-val-err" style="display:none;margin:0 18px;padding:8px 12px;background:#fee2e2;border-radius:8px;font-size:12px;color:#dc2626;font-weight:600">&#9888;&#65039; Harap lengkapi semua field bertanda *</div>'+
  aiNote;
}

function mFooter(prevLabel, nextLabel, nextId, prevId, isLoad, isFinal){
  nextId = nextId || 'mo-next';
  prevId = prevId || 'mo-prev';
  var nextBtn = '<button id="'+nextId+'" class="tap" style="flex:1;background:#16a34a;color:#fff;font-weight:700;font-size:13px;padding:12px;border-radius:12px">'+esc(nextLabel||'Lanjut →')+'</button>';
  if(isLoad) nextBtn = '<button id="mo-load-btn" class="tap" style="flex:1;background:#16a34a;color:#fff;font-weight:700;font-size:13px;padding:12px;border-radius:12px">'+esc(nextLabel||'Proses AI →')+'</button>';
  if(isFinal) nextBtn = '<button id="mo-next" class="tap" onclick="mClose()" style="flex:1;background:#16a34a;color:#fff;font-weight:700;font-size:13px;padding:12px;border-radius:12px">'+esc(nextLabel||'Selesai')+'</button>';
  var prevBtn = prevLabel ? '<button id="'+prevId+'" class="tap" style="width:44px;background:#f7f6f3;border-radius:12px;font-size:18px;color:#6b7280">&#8592;</button>' : '';
  return '<div class="mo-footer"><div style="display:flex;gap:8px">'+prevBtn+nextBtn+'</div></div>';
}

function fieldHtml(label, id, type, required, placeholder, options, defaultVal){
  type = type||'text';
  var req = required?'data-required="1" ':'';
  var star = required?'<span style="color:#ef4444">*</span>':'';
  var val = (M.data&&M.data[id]!==undefined&&M.data[id]!=='') ? M.data[id] : (defaultVal||'');
  var input = '';
  if(type==='select'){
    var opts = (options||[]).map(function(o){var v=o.v||o,l=o.l||o;return '<option value="'+esc(v)+'"'+(val&&v===val?' selected':'')+'>'+esc(l)+'</option>';}).join('');
    input = '<select id="'+id+'" data-field="'+id+'" '+req+' style="width:100%;background:#f7f6f3;border:1.5px solid #e8e4dd;border-radius:10px;padding:10px 12px;font-size:14px;color:#1c1a17"><option value="">Pilih...</option>'+opts+'</select>';
  } else if(type==='textarea'){
    input = '<textarea id="'+id+'" data-field="'+id+'" '+req+' rows="3" placeholder="'+esc(placeholder||'')+'" style="width:100%;background:#f7f6f3;border:1.5px solid #e8e4dd;border-radius:10px;padding:10px 12px;font-size:14px;color:#1c1a17;resize:none">'+esc(val)+'</textarea>';
  } else {
    input = '<input id="'+id+'" data-field="'+id+'" type="'+type+'" '+req+' placeholder="'+esc(placeholder||'')+'" value="'+esc(val)+'" style="width:100%;background:#f7f6f3;border:1.5px solid #e8e4dd;border-radius:10px;padding:10px 12px;font-size:14px;color:#1c1a17"/>';
  }
  return '<div class="field-wrap"><label>'+esc(label)+' '+star+'</label>'+input+'</div>';
}

function infoRow(label, value, color){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0ede8">'+
    '<span style="font-size:12px;color:#6b7280">'+esc(label)+'</span>'+
    '<span style="font-size:13px;font-weight:700;color:'+(color||'#1c1a17')+'">'+esc(String(value))+'</span>'+
  '</div>';
}

function successScreen(title, sub, details, icon){
  icon = icon||'✅';
  var detHtml = (details||[]).map(function(d){return infoRow(d[0],d[1],d[2]);}).join('');
  return mHeader(title,0,1,true)+
    '<div class="mo-body" style="text-align:center">'+
      '<div class="success-icon">'+icon+'</div>'+
      '<div style="font-size:16px;font-weight:800;color:#1c1a17;margin-bottom:6px">'+esc(title)+'</div>'+
      '<div style="font-size:13px;color:#6b7280;margin-bottom:16px;line-height:1.6">'+esc(sub)+'</div>'+
      (detHtml?'<div style="background:#f7f6f3;border-radius:12px;padding:10px 14px;text-align:left;margin-bottom:16px">'+detHtml+'</div>':'')+
    '</div>'+
    mFooter(null,'Selesai & Tutup','mo-next',null,false,true);
}

function loadingScreen(title, msg){
  return mHeader(title,0,1,false)+
    '<div class="mo-body" style="text-align:center;padding:32px 18px">'+
      '<div class="load-ring"></div>'+
      '<div style="font-size:14px;font-weight:700;color:#1c1a17;margin-bottom:6px">'+esc(msg)+'</div>'+
      '<div style="font-size:12px;color:#9c9a92">Mohon tunggu...</div>'+
    '</div>';
}

function screenData(){
  var u=S.user, a=ac();

  var pct=Math.round((c.hK-c.hP)/c.hK*100);

  var bigChart=(function(){
    var W=280,H=60,hist=c.hist,mn=Math.min.apply(null,hist),mx=Math.max.apply(null,hist),r=mx-mn||1;
    var pts=hist.map(function(v,i){return (i/(hist.length-1)*W)+','+(H-((v-mn)/r)*(H-8)-4);}).join(' ');
    var col=c.trend==='up'?'#ef4444':c.trend==='down'?'#16a34a':'#d97706';
    var bg=c.trend==='up'?'#fff0f0':c.trend==='down'?'#f0fdf4':'#fffbeb';
    var dots=hist.map(function(v,i){var x=i/(hist.length-1)*W,y=H-((v-mn)/r)*(H-8)-4;return '<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="'+col+'"/><circle cx="'+x+'" cy="'+y+'" r="1.5" fill="white"/>';}).join('');
    return '<svg width="100%%" viewBox="0 0 '+W+' '+(H+4)+'" style="overflow:visible">'+
      '<polygon points="0,'+(H+4)+' '+pts+' '+W+','+(H+4)+'" fill="'+bg+'"/>'+
      '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
      dots+'</svg>';

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
      tools.map(function(t){
        var attrs=t.flow?'data-flow="'+t.flow+'"':(t.t?'data-nav="'+t.t+'"':'');
        return '<button class="tap" '+attrs+' style="background:#fff;border:1px solid #e8e4dd;border-radius:14px;padding:14px;text-align:left;box-shadow:0 1px 2px rgba(0,0,0,.04)">'+
          '<div style="font-size:24px;margin-bottom:6px">'+t.icon+'</div>'+
          '<div style="font-size:12px;font-weight:700;color:#1c1a17">'+esc(t.l)+'</div>'+
          '<div style="font-size:11px;color:#9c9a92;margin-top:2px">'+esc(t.d)+'</div>'+
        '</button>';
      }).join('')+
      '</div>'+
      finHtml+logHtml+cilangkapHtml+
      '<div style="margin-top:16px;padding-top:16px;border-top:1px solid #e8e4dd;margin-bottom:24px">'+
        '<button id="logout-btn" style="width:100%%;background:#fff0f0;border:1px solid #fecaca;color:#dc2626;font-weight:700;padding:12px;border-radius:14px;font-size:13px">&#8635; Ganti Akun / Keluar</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* ═══════════════════════════
   RENDER
═══════════════════════════ */
function render(){
  var shell=document.getElementById('shell');
  if(!S.user){ screenLogin(); bindEvents(); return; }
  var screens={beranda:screenBeranda,ai:screenAI,data:screenData,akun:screenAkun};
  var fn=screens[S.tab]||screenBeranda;
  shell.innerHTML='<div class="tab-content">'+fn()+'</div>'+renderNav();
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.addEventListener('click',function(){ set({tab:el.getAttribute('data-nav')}); });
  });
  document.querySelectorAll('[data-login]').forEach(function(el){
    el.addEventListener('click',function(){
      var u=USERS.find(function(x){return x.role===el.getAttribute('data-login');});
      set({user:u, tab:'beranda'});
    });
  });
  document.querySelectorAll('[data-flow]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      M.open(el.getAttribute('data-flow'));
    });
  });
  document.querySelectorAll('[data-ai-tab]').forEach(function(el){
    el.addEventListener('click',function(){ set({tab:'ai', aiTab:el.getAttribute('data-ai-tab')}); });
  });
  document.querySelectorAll('[data-harga-sel]').forEach(function(el){
    el.addEventListener('click',function(){ set({hargaSel:parseInt(el.getAttribute('data-harga-sel'))}); });
  });
  var lb=document.getElementById('logout-btn');
  if(lb) lb.addEventListener('click',function(){ set({user:null,tab:'beranda',hargaSel:0,aiTab:'recs'}); });
}

render();
</script>
</body>
</html>
